<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Connectivity Longevity - R4 WiFi Voltage Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Connectivity Longevity</h1>
      <a class="header-link" href="index.html">Dashboard</a>
    </header>

    <main>
      <div class="raw-data-summary" id="longevitySummary">Loading connectivity longevity...</div>

      <div class="table-container">
        <table class="raw-data-table">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Birth</th>
              <th scope="col">Death</th>
              <th scope="col">Longevity (days)</th>
              <th scope="col">Status</th>
              <th scope="col">Note</th>
            </tr>
          </thead>
          <tbody id="longevityTableBody">
            <tr>
              <td colspan="6">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="longevity.js"></script>
</body>
</html>
